version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - |
          rm -f .env.production
          touch .env.production
          for var in DATABASE_URL DIRECT_URL GITHUB_TOKEN GITHUB_API_TIMEOUT_MS ADMIN_GITHUB_USERNAMES; do
            eval "value=\${$var}"
            if [ -n "$value" ]; then
              printf '%s=%s\n' "$var" "$value" >> .env.production
            fi
          done
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
      - .next/cache/**/*
